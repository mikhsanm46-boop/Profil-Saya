<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Profesional - Muhammad Ikhsan Maulana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0f1e; /* fallback */
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1b2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animasi partikel bintang di background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: 0.3;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.8); }
        }

        /* Animasi muncul kartu */
        @keyframes fadeInSlideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            position: relative;
            z-index: 1;
            background: #112240;
            width: 100%;
            max-width: 450px;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            animation: fadeInSlideUp 0.8s ease-out forwards;
            border: 1px solid rgba(0, 123, 255, 0.25);
            box-shadow: 0 0 40px rgba(0, 123, 255, 0.2), 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 60px rgba(0, 123, 255, 0.4), 0 25px 50px rgba(0,0,0,0.7);
            border-color: rgba(0, 123, 255, 0.5);
        }

        /* Gambar profil dengan border animasi */
        .profile-img-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 2;
            border: 4px solid #112240; /* menyatu dengan bg card */
        }

        .profile-img-wrapper::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: conic-gradient(#00d4ff, #007bff, #00d4ff);
            z-index: 1;
            animation: rotateBorder 4s linear infinite;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 26px;
            color: #fff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .skill-badge {
            background: rgba(0, 123, 255, 0.15);
            color: #64ffda;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(0, 123, 255, 0.4);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .skill-badge:hover {
            background: #007bff;
            color: white;
            border-color: #007bff;
            box-shadow: 0 0 15px rgba(0,123,255,0.4);
            transform: translateY(-2px);
        }

        .services {
            text-align: left;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(2px);
        }

        .services h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #ccd6f6;
            display: flex;
            align-items: center;
        }
        
        .services h2::before {
            content: "✦ ";
            margin-right: 8px;
            color: #64ffda;
        }

        .services ul {
            list-style: none;
            font-size: 15px;
            color: #a8b2d1;
            line-height: 1.8;
        }

        .services li::before {
            content: "✓ ";
            color: #64ffda;
            font-weight: bold;
            margin-right: 5px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Tombol dengan hover glow */
        .btn {
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(135deg, #1e3a5f, #0d1b2a);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 15px rgba(0,123,255,0.3);
            border-color: rgba(255,255,255,0.3);
        }

        /* Gradasi khusus per tombol (tetap dark blue base) */
        .whatsapp { background: linear-gradient(135deg, #075E54, #128C7E); }
        .facebook { background: linear-gradient(135deg, #0a2647, #144272); }
        .instagram { background: linear-gradient(135deg, #8a2387, #e94057, #f27121); }
        .linkedin { background: linear-gradient(135deg, #0a66c2, #004182); }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Bintang latar -->
    <div class="stars" id="stars"></div>

    <div class="card">
        <!-- Gambar Profil dengan border animasi -->
        <div class="profile-img-wrapper">
            <img src="https://i.ibb.co/zWxRFDDW/e005e55d-4949-4105-8094-c8e2852ec8d4.jpg" alt="Muhammad Ikhsan Maulana" class="profile-img">
        </div>

        <h1>Muhammad Ikhsan Maulana</h1>
        <div class="skills">
            <span class="skill-badge">Analisa Market</span>
            <span class="skill-badge">Teknisi HP</span>
            <span class="skill-badge">Programmer</span>
            <span class="skill-badge">UI/UX Design</span>
            <span class="skill-badge">Web Design</span>
        </div>

        <div class="services">
            <h2>Menerima Jasa:</h2>
            <ul>
                <li>Pembuatan Page Pribadi</li>
                <li>Pembuatan Website</li>
                <li>Servis Handphone</li>
                <li>Pembuatan Bot</li>
            </ul>
        </div>

        <div class="links">
            <a href="https://wa.me/6282324515844" class="btn whatsapp" target="_blank">Hubungi via WhatsApp</a>
            <a href="https://www.facebook.com/share/1CeFR6Ayfy/" class="btn facebook" target="_blank">Kunjungi Facebook</a>
            <a href="https://www.instagram.com/mikhsanm3115?igsh=czltODRvcnFkNXUx" class="btn instagram" target="_blank">Lihat Instagram</a>
            <a href="https://www.linkedin.com/in/muhammad-ikhsan-maulana-2833851a4" class="btn linkedin" target="_blank">Profil LinkedIn</a>
        </div>
    </div>

    <script>
        // Membuat bintang-bintang di background secara dinamis
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
